name = "rnregis"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# Next.js รันบน Cloudflare Workers ผ่าน OpenNext adapter
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# หมายเหตุ: ความลับ (SUPABASE_*, STAFF_HASH) ตั้งผ่าน `wrangler secret put`
# หรือ Dashboard → Worker → Settings → Variables ไม่ใส่ในไฟล์นี้
